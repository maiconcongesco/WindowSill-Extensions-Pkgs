name: Deploy Extension Manifest

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-manifest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache .nuke/temp, ~/.nuget/packages
        uses: actions/cache@v4
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('global.json', 'build/**/*.csproj', 'build/**/*.props', 'build/**/*.targets') }}

      - name: 'Run: GenerateManifest'
        run: ./build.cmd GenerateManifest

      - name: Check manifest.json exists
        run: |
          if [ ! -f "output/manifest.json" ]; then
            echo "manifest.json not found!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages-artifact
          cp output/manifest.json pages-artifact/

      - name: Upload manifest.json as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create Release Summary
        run: |
          echo "# Extension Manifest Updated" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json" >> $GITHUB_STEP_SUMMARY
